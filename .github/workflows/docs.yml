name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a rebuild by hand

# Least-privilege token, plus the Pages/OIDC permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build the docs
        # Add --strict once the docstring warnings below are cleaned up,
        # so broken links/refs fail the build.
        run: uv run --group docs mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site            # mkdocs' default output directory

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
